<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Tongxin">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Tongxin</title>
  <link rel="manifest" href="manifest.json">

  <!-- TradingView Lightweight Charts v4 -->
  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <script>
  // Flutter→JS bridge for lightweight-charts
  window._lwCharts = {};

  window.lwCreate = function(id, darkMode) {
    const el = document.getElementById(id);
    if (!el || !window.LightweightCharts) return;
    const bg   = darkMode ? '#0D0F14' : '#FFFFFF';
    const text = darkMode ? '#9CA3AF' : '#374151';
    const grid = darkMode ? '#1C2030' : '#E5E7EB';
    const border = darkMode ? '#2D3748' : '#D1D5DB';

    const chart = LightweightCharts.createChart(el, {
      layout: { background: { type: 'solid', color: bg }, textColor: text },
      grid: { vertLines: { color: grid }, horzLines: { color: grid } },
      crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
      rightPriceScale: { borderColor: border, scaleMargins: { top: 0.08, bottom: 0.28 } },
      timeScale: { borderColor: border, timeVisible: true, secondsVisible: false, rightOffset: 5 },
      handleScroll: true,
      handleScale: true,
    });

    const candle = chart.addCandlestickSeries({
      upColor: '#26A17B', downColor: '#E84142',
      borderUpColor: '#26A17B', borderDownColor: '#E84142',
      wickUpColor: '#26A17B', wickDownColor: '#E84142',
    });

    const vol = chart.addHistogramSeries({
      priceFormat: { type: 'volume' },
      priceScaleId: 'vol',
    });
    chart.priceScale('vol').applyOptions({ scaleMargins: { top: 0.78, bottom: 0 } });

    // Crosshair tooltip overlay
    const tooltip = document.createElement('div');
    tooltip.style.cssText = 'position:absolute;top:8px;left:8px;z-index:10;padding:4px 8px;background:rgba(13,15,20,0.85);border:1px solid #2D3748;border-radius:4px;font-size:11px;color:#E5E7EB;pointer-events:none;font-family:monospace;display:none';
    el.style.position = 'relative';
    el.appendChild(tooltip);

    chart.subscribeCrosshairMove(function(param) {
      if (!param || !param.time) { tooltip.style.display = 'none'; return; }
      const c = param.seriesData.get(candle);
      if (!c) { tooltip.style.display = 'none'; return; }
      const upCol = '#26A17B', dnCol = '#E84142';
      const col = c.close >= c.open ? upCol : dnCol;
      const d = new Date(param.time * 1000);
      const ts = d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0');
      tooltip.innerHTML = '<span style="color:#9CA3AF">'+ts+'</span>  '
        +'<span style="color:'+col+'">O</span> '+c.open.toFixed(2)+'  '
        +'<span style="color:'+col+'">H</span> '+c.high.toFixed(2)+'  '
        +'<span style="color:'+col+'">L</span> '+c.low.toFixed(2)+'  '
        +'<span style="color:'+col+'">C</span> '+c.close.toFixed(2);
      tooltip.style.display = 'block';
    });

    // ResizeObserver for auto-resize
    if (window.ResizeObserver) {
      const ro = new ResizeObserver(() => {
        chart.applyOptions({ width: el.clientWidth, height: el.clientHeight });
      });
      ro.observe(el);
    }

    window._lwCharts[id] = { chart, candle, vol };
  };

  window.lwSetData = function(id, candleJson, volJson) {
    const c = window._lwCharts[id];
    if (!c) return;
    try {
      c.candle.setData(JSON.parse(candleJson));
      if (volJson) c.vol.setData(JSON.parse(volJson));
      c.chart.timeScale().fitContent();
    } catch(e) {}
  };

  window.lwUpdate = function(id, candleJson) {
    const c = window._lwCharts[id];
    if (!c) return;
    try {
      const d = JSON.parse(candleJson);
      c.candle.update(d);
      if (d.volume != null) {
        c.vol.update({ time: d.time, value: d.volume, color: d.close >= d.open ? '#26A17B40' : '#E8414240' });
      }
    } catch(e) {}
  };

  window.lwFitContent = function(id) {
    const c = window._lwCharts[id];
    if (c) c.chart.timeScale().fitContent();
  };

  window.lwDestroy = function(id) {
    const c = window._lwCharts[id];
    if (!c) return;
    try { c.chart.remove(); } catch(e) {}
    delete window._lwCharts[id];
  };
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
